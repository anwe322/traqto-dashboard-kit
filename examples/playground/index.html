<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>traqto Dashboard-Kit — Playground</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Source Sans 3", system-ui, sans-serif;
        background:
          radial-gradient(1200px 600px at 10% -10%, #f3e8ff 0%, transparent 60%),
          radial-gradient(900px 500px at 100% 0%, #fce7f3 0%, transparent 55%),
          linear-gradient(180deg, #faf7ff 0%, #f7f1ff 100%);
        color: #1f1235;
      }
      @keyframes tdk-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
